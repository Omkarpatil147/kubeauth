<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KubeAuth Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:44px;width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:30px;}
.logo-icon{width:56px;height:56px;background:#3B82F6;border-radius:14px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;}
.logo-title{font-size:24px;font-weight:700;color:#f1f5f9;}
.logo-sub{font-size:13px;color:#64748b;margin-top:5px;}
.field{margin-bottom:20px;}
label{display:block;font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.05em;}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:9px;padding:12px 15px;font-size:14px;color:#f1f5f9;outline:none;transition:border 0.2s;}
input:focus{border-color:#3B82F6;}
.btn{width:100%;background:#3B82F6;color:white;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background 0.2s;}
.btn:hover{background:#2563EB;}
.btn:active{background:#1d4ed8;}
.err{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;border-radius:9px;padding:11px 15px;font-size:13px;margin-bottom:18px;text-align:center;}
.hint{text-align:center;margin-top:20px;font-size:12px;color:#475569;line-height:2;}
.hint code{color:#94a3b8;background:#0f172a;border:1px solid #334155;border-radius:5px;padding:2px 8px;font-family:monospace;}
.divider{border-top:1px solid #1e293b;margin:20px 0;}
.features{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.feat{background:#0f172a;border-radius:8px;padding:8px 10px;font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px;}
.feat-dot{width:6px;height:6px;border-radius:50%;background:#3B82F6;flex-shrink:0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="logo-title">KubeAuth</div>
    <div class="logo-sub">Enterprise Access Control Platform</div>
  </div>
  <!--ERROR-->
  <form method="POST" action="/login">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required autofocus autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn">Sign in to Dashboard</button>
  </form>
  <div class="hint">
    Default credentials<br>
    Username: <code>admin</code> &nbsp;&nbsp; Password: <code>admin123</code>
  </div>
  <div class="divider"></div>
  <div class="features">
    <div class="feat"><div class="feat-dot"></div>Kubernetes RBAC</div>
    <div class="feat"><div class="feat-dot"></div>Blockchain Logs</div>
    <div class="feat"><div class="feat-dot"></div>Threat Detection</div>
    <div class="feat"><div class="feat-dot"></div>SOC 2 Compliance</div>
  </div>
</div>
</body>
</html>
